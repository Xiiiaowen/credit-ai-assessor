<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 44 200 120" width="200" height="120">
  <defs>
    <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ecc71"/>
      <stop offset="50%" style="stop-color:#f39c12"/>
      <stop offset="100%" style="stop-color:#e74c3c"/>
    </linearGradient>
  </defs>

  <!-- Gauge arc track -->
  <path d="M 30 120 A 70 70 0 0 1 170 120"
        fill="none" stroke="#dce3ed" stroke-width="16" stroke-linecap="round"/>

  <!-- Gauge arc colored (green → amber → red) -->
  <path d="M 30 120 A 70 70 0 0 1 170 120"
        fill="none" stroke="url(#gaugeGrad)" stroke-width="16"
        stroke-linecap="round" stroke-dasharray="220" stroke-dashoffset="70"/>

  <!-- Gauge needle -->
  <line x1="100" y1="120" x2="152" y2="68"
        stroke="#1a3a6e" stroke-width="4" stroke-linecap="round"/>

  <!-- Needle pivot -->
  <circle cx="100" cy="120" r="9" fill="#1a3a6e"/>
  <circle cx="100" cy="120" r="4" fill="white"/>

  <!-- AI neural dots below -->
  <circle cx="44" cy="145" r="5" fill="#3498db" opacity="0.85"/>
  <circle cx="72" cy="153" r="5" fill="#3498db" opacity="0.85"/>
  <circle cx="100" cy="156" r="5" fill="#3498db" opacity="0.85"/>
  <circle cx="128" cy="153" r="5" fill="#3498db" opacity="0.85"/>
  <circle cx="156" cy="145" r="5" fill="#3498db" opacity="0.85"/>

  <line x1="44" y1="145" x2="72" y2="153" stroke="#3498db" stroke-width="1.5" opacity="0.4"/>
  <line x1="72" y1="153" x2="100" y2="156" stroke="#3498db" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="156" x2="128" y2="153" stroke="#3498db" stroke-width="1.5" opacity="0.4"/>
  <line x1="128" y1="153" x2="156" y2="145" stroke="#3498db" stroke-width="1.5" opacity="0.4"/>
</svg>
